<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NCERT Archive— Notes, Summaries & Q&A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grain"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">N</div>
        <div class="brand-text">
          <h1>NCERT</h1>
          <p>notes, summaries, question answers</p>
        </div>
      </div>
      <nav class="view-toggle" aria-label="Collection type">
        <button class="toggle-btn active" data-view="notes" aria-selected="true">Notes</button>
        <button class="toggle-btn" data-view="summaries" aria-selected="false">Summaries</button>
        <button class="toggle-btn" data-view="qa" aria-selected="false">Q & A</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="catalog-controls">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search class, subject, chapter..." autocomplete="off" />
        <span id="resultCount" class="search-count">0 / 0</span>
      </div>
      <div class="filter-wrap">
        <label for="genreFilter">Subject</label>
        <select id="genreFilter"><option value="">All</option></select>
      </div>
    </section>

    <section id="catalog" class="catalog" aria-live="polite"></section>
    <section id="emptyState" class="empty-state" hidden>No NCERT material matches your search.</section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <button id="modalClose" class="modal-close" aria-label="Close">×</button>
      <div id="modalContent" class="modal-content"></div>
    </div>
  </div>

  <section id="readerView" class="reader-view" hidden aria-labelledby="readerTitle">
    <header class="reader-header">
      <button id="readerBack" class="reader-back" type="button">← Back</button>
      <div class="reader-heading">
        <p id="readerKicker" class="reader-kicker"></p>
        <h2 id="readerTitle">Detailed Notes</h2>
      </div>
      <div class="reader-actions">
        <button id="readerPrint" class="reader-action-btn" type="button">Print / Save PDF</button>
      </div>
    </header>
    <div id="readerContent" class="reader-content"></div>
  </section>

  <footer class="site-footer">
    NCERT collection for study use. Add PDFs/Docs links and manual content in <code>media/library.json</code>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
