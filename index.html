<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCERT Hub - Maximalist Study Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header with Navigation -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <h1 class="logo">📚 NCERT HUB</h1>
                <p class="tagline">Your Complete Study Companion</p>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-filter="all">All</button>
                <button class="nav-btn" data-filter="notes">Notes</button>
                <button class="nav-btn" data-filter="summary">Summary</button>
                <button class="nav-btn" data-filter="questions">Q&A</button>
            </nav>
        </div>
    </header>

    <!-- Search and Filter Section -->
    <section class="search-section">
        <div class="search-container">
            <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="🔍 Search by subject, chapter, or keyword..."
            >
            <select id="subjectFilter" class="filter-select">
                <option value="">All Subjects</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
                <option value="History">History</option>
                <option value="Geography">Geography</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Physics">Physics</option>
                <option value="Biology">Biology</option>
            </select>
        </div>
    </section>

    <!-- Add New Content Button -->
    <section class="add-content-section">
        <button class="add-btn" id="addBtn">+ Add New Content</button>
    </section>

    <!-- Main Content Grid -->
    <main class="content-grid" id="contentGrid">
        <!-- Content cards will be dynamically inserted here -->
    </main>

    <!-- Modal for Adding/Editing Content -->
    <div class="modal" id="contentModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Content</h2>
            
            <form id="contentForm" class="content-form">
                <div class="form-group">
                    <label for="contentType">Content Type *</label>
                    <select id="contentType" required>
                        <option value="">Select Type</option>
                        <option value="notes">Notes</option>
                        <option value="summary">Summary</option>
                        <option value="questions">Questions & Answers</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <select id="subject" required>
                        <option value="">Select Subject</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="History">History</option>
                        <option value="Geography">Geography</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Physics">Physics</option>
                        <option value="Biology">Biology</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="chapter">Chapter *</label>
                    <input type="text" id="chapter" placeholder="e.g., Chapter 5: Quadratic Equations" required>
                </div>

                <div class="form-group">
                    <label for="title">Title/Heading *</label>
                    <input type="text" id="title" placeholder="Enter title" required>
                </div>

                <div class="form-group">
                    <label for="content">Content *</label>
                    <textarea id="content" placeholder="Enter your notes, summary, or Q&A here..." rows="8" required></textarea>
                </div>

                <div class="form-group">
                    <label for="difficulty">Difficulty Level</label>
                    <select id="difficulty">
                        <option value="Easy">Easy</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" placeholder="e.g., formula, important, exam-prep">
                </div>

                <button type="submit" class="submit-btn">Add Content</button>
            </form>
        </div>
    </div>

    <!-- Content View Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content view-modal-content">
            <span class="close">&times;</span>
            <div id="viewContent" class="view-content">
                <!-- Content will be inserted here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
