<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive — Personal Media Collection</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">A</div>
            <div class="header-text">
                <h1>The Archive</h1>
                <p>a personal collection, catalogued</p>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab active" data-category="music">Music</button>
            <button class="tab" data-category="video">Video</button>
        </nav>

        <div class="controls">
            <div class="filter-group">
                <label for="genre">Genre</label>
                <select id="genre">
                    <option value="all">All</option>
                </select>
            </div>
            <div class="search-group">
                <input type="text" id="search" placeholder="Search...">
            </div>
        </div>

        <main id="media-grid" class="media-grid">
            <div class="empty-state">No entries match your search.</div>
        </main>

        <footer>
            <p>Catalogued for personal use. Add your own files to <code>/media/music</code> and <code>/media/video</code>, then update <code>library.json</code>.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
